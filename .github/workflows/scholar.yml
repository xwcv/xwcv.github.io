name: Update Google Scholar stats

on:
  schedule:
    # 03:17 UTC, every Monday and Thursday
    - cron: '17 3 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and update res/scholar.json
        run: python3 tools/update_scholar.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet res/scholar.json; then
            echo "no change"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add res/scholar.json
            git commit -m "Update Google Scholar stats"
            git push
          fi
